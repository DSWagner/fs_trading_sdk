    <text x="110" y="254" text-anchor="middle" font-family="Helvetica, sans-serif" font-size="9" font-style="italic" fill="#3F3A33">Two distinct windows.</text>
    <text x="110" y="280" text-anchor="middle" font-family="Courier, monospace" font-size="8" fill="#6B5E50" letter-spacing="0.5">@lab_lurker · DEVELOPING</text>
