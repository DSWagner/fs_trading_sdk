  <text x="80" y="220" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" fill="#1A1814" letter-spacing="-2">Stop betting</text>
  <text x="80" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="700" font-style="italic" fill="#C2410C" letter-spacing="-2">in private.</text>

