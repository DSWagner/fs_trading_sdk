  <text x="80" y="555" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A1814">Conviction</text>
  <text x="200" y="555" font-family="Courier, monospace" font-size="14" letter-spacing="2" fill="#6B5E50">A PUBLICATION ON THE BELIEF MARKET PRIMITIVE</text>

  <text x="80" y="585" font-family="Courier, monospace" font-size="14" letter-spacing="1.5" fill="#9C8E7E">BUILT ON THE FUNCTIONSPACE SDK</text>

